name: Publish MCP Server

on:
  release:
    types: [created]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/mcp_server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          scope: '@createveai'
      
      - name: Install dependencies
        # Use npm install instead of npm ci since there's no package-lock.json
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Set package version from release
        run: npm version --no-git-tag-version ${GITHUB_REF#refs/tags/v}
      
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
